<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<script>
  // GitHub Pages SPA redirect: store the full path and redirect to root
  var path = window.location.pathname + window.location.search;
  sessionStorage.setItem('ghpages_redirect', path);
  window.location.replace('/');
</script>
</head>
<body></body>
</html>
